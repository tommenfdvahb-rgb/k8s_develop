name: Build K8s Offline Package

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [ ubuntu-24.04, ubuntu-24.04-arm ]
        base_image: [ rocky9, ubuntu24.04 ]

    runs-on: ${{ matrix.arch }}

    # 并发控制，避免相同组合重复跑
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.arch }}-${{ matrix.base_image }}
      cancel-in-progress: true

    env:
      SEALOS_VERSION: 5.1.1
      K8S_VERSION: v1.30.14
      CALICO_VERSION: v3.27.4
      INGRESS_VERSION: v1.11.3
      LONGHORN_VERSION: v1.6.4
      # 新增：根据 matrix 动态映射平台
      PLATFORM: ${{ matrix.arch == 'ubuntu-24.04' && 'linux/amd64' || 'linux/arm64' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare directories
        run: mkdir -p release/bin release/images release/packages release/scripts

      # ====================== 1. 安装 sealos ======================
      - name: Install sealos
        run: |
          SEALOS_ARCH=${{ matrix.arch == 'ubuntu-24.04' && 'amd64' || 'arm64' }}
          curl -fL --retry 3 -o sealos.tar.gz \
            https://github.com/labring/sealos/releases/download/v${SEALOS_VERSION}/sealos_${SEALOS_VERSION}_linux_${SEALOS_ARCH}.tar.gz
          
          tar -xzf sealos.tar.gz
          chmod +x sealos
          sudo install -m 0755 sealos /usr/local/bin/sealos
          cp sealos release/bin/sealos
          sealos version

      # ====================== 2. 准备镜像列表 ======================
      - name: Prepare k8s images list
        run: |
          cat <<EOF > k8s-images.txt
          registry.cn-shanghai.aliyuncs.com/labring/kubernetes:${K8S_VERSION}
          registry.cn-shanghai.aliyuncs.com/labring/calico:${CALICO_VERSION}
          registry.cn-shanghai.aliyuncs.com/labring/ingress-nginx:${INGRESS_VERSION}
          registry.cn-shanghai.aliyuncs.com/labring/longhorn:${LONGHORN_VERSION}
          EOF

      # ====================== 3. 拉取并打包镜像（关键修复） ======================
      - name: Build k8s image tar
        run: |
          docker run --rm --privileged \
            -v $(pwd):/work \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ubuntu:22.04 bash -c '
              set -e
              apt-get update -qq
              apt-get install -y ca-certificates curl uidmap fuse-overlayfs

              cd /work
              cp release/bin/sealos /usr/local/bin/sealos
              chmod +x /usr/local/bin/sealos

              mkdir -p /.sealos/logs
              chmod 777 /.sealos

              echo "=== Pulling images for ${{ env.PLATFORM }} ==="
              /usr/local/bin/sealos pull --platform ${{ env.PLATFORM }} $(cat k8s-images.txt)

              echo "=== Saving images ==="
              /usr/local/bin/sealos save -o release/images/k8s-images.tar $(cat k8s-images.txt)
            '

      # ====================== 4. 构建系统依赖包（根据 base_image 区分） ======================
      - name: Build packages
        run: |
          if [[ "${{ matrix.base_image }}" == "ubuntu24.04" ]]; then
            docker run --platform ${{ env.PLATFORM }} --rm -v $(pwd):/out ubuntu:24.04 bash -c '
              set -e
              apt-get update -qq
              apt-get install -y dpkg-dev
              mkdir -p /out/release/packages/deb

              apt-get --download-only install -y \
                conntrack socat ipset iptables \
                nfs-common open-iscsi iproute2 netcat-openbsd \
                tar coreutils util-linux procps openssh-client

              cp /var/cache/apt/archives/*.deb /out/release/packages/deb/ || true
            '
          else
            # rocky9 使用 rpm（你可以后续完善 dnf 下载逻辑）
            echo "Rocky9 RPM packaging not fully implemented yet. Skipping for now."
            mkdir -p release/packages/rpm
          fi

      # ====================== 5. 最终打包 ======================
      - name: Package offline bundle
        run: |
          mkdir -p release/scripts
          cp install.sh release/scripts/ 2>/dev/null || true
          echo "${K8S_VERSION}" > release/version.txt
          echo "${SEALOS_VERSION}" > release/bin/sealos-version.txt

          tar -czf k8s-offline-${{ matrix.base_image }}-${{ matrix.arch == 'ubuntu-24.04' && 'amd64' || 'arm64' }}.tar.gz -C release .
          ls -lh *.tar.gz

      # ====================== 6. 发布 ======================
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: k8s-offline-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}