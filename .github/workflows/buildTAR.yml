name: Build K8s Offline Package

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner_arch: [ ubuntu-24.04, ubuntu-24.04-arm ]
        os_type: [ deb, rpm ]

    runs-on: ${{ matrix.runner_arch }}

    concurrency:
      group: ${{ github.workflow }}-${{ matrix.runner_arch }}-${{ matrix.os_type }}
      cancel-in-progress: true

    env:
      SEALOS_VERSION: 5.1.1
      K8S_VERSION: v1.30.14
      CALICO_VERSION: v3.27.4
      INGRESS_VERSION: v1.11.3
      LONGHORN_VERSION: v1.6.4

      # 动态映射
      PLATFORM: ${{ matrix.runner_arch == 'ubuntu-24.04' && 'linux/amd64' || 'linux/arm64' }}
      ARCH_NAME: ${{ matrix.runner_arch == 'ubuntu-24.04' && 'amd64' || 'arm64' }}
      PKG_TYPE: ${{ matrix.os_type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p release/bin release/images release/packages/deb release/packages/rpm release/scripts

      # ====================== 1. 安装 sealos ======================
      - name: Install sealos
        run: |
          SEALOS_ARCH=${{ matrix.runner_arch == 'ubuntu-24.04' && 'amd64' || 'arm64' }}
          curl -fL --retry 3 -o sealos.tar.gz \
            https://github.com/labring/sealos/releases/download/v${SEALOS_VERSION}/sealos_${SEALOS_VERSION}_linux_${SEALOS_ARCH}.tar.gz
          
          tar -xzf sealos.tar.gz
          chmod +x sealos
          sudo install -m 0755 sealos /usr/local/bin/sealos
          cp sealos release/bin/sealos
          sealos version

      # ====================== 2. 准备镜像列表 ======================
      - name: Prepare k8s images list
        run: |
          cat <<EOF > k8s-images.txt
          registry.cn-shanghai.aliyuncs.com/labring/kubernetes:${K8S_VERSION}
          registry.cn-shanghai.aliyuncs.com/labring/calico:${CALICO_VERSION}
          registry.cn-shanghai.aliyuncs.com/labring/ingress-nginx:${INGRESS_VERSION}
          registry.cn-shanghai.aliyuncs.com/labring/longhorn:${LONGHORN_VERSION}
          EOF

      # ====================== 3. 拉取并打包镜像（多架构） ======================
      - name: Build k8s image tar
        run: |
          docker run --rm --privileged \
            -v $(pwd):/work \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ubuntu:22.04 bash -c '
              set -e
              apt-get update -qq
              apt-get install -y ca-certificates curl uidmap fuse-overlayfs

              cd /work
              cp release/bin/sealos /usr/local/bin/sealos
              chmod +x /usr/local/bin/sealos

              mkdir -p /.sealos/logs
              chmod 777 /.sealos

              echo "=== Pulling images for ${{ env.PLATFORM }} ==="
              /usr/local/bin/sealos pull --platform ${{ env.PLATFORM }} $(cat k8s-images.txt)

              echo "=== Saving images ==="
              /usr/local/bin/sealos save -o release/images/k8s-images.tar $(cat k8s-images.txt)
            '

      # ====================== 4. 下载系统依赖包（DEB / RPM 分开） ======================
      - name: Build packages
        run: |
          if [[ "${{ matrix.os_type }}" == "deb" ]]; then
            echo "=== Building DEB packages for ${{ env.PLATFORM }} ==="
            docker run --platform ${{ env.PLATFORM }} --rm -v $(pwd):/out ubuntu:24.04 bash -c '
              set -e
              apt-get update -qq
              apt-get install -y dpkg-dev
              mkdir -p /out/release/packages/deb

              apt-get --download-only install -y \
                conntrack socat ipset iptables \
                nfs-common open-iscsi iproute2 netcat-openbsd \
                tar coreutils util-linux procps openssh-client sshpass || true

              cp /var/cache/apt/archives/*.deb /out/release/packages/deb/ || true
              echo "Downloaded $(ls /out/release/packages/deb/*.deb 2>/dev/null | wc -l) deb packages"
            '
          else
            echo "=== Building RPM packages for Rocky 9 (${{ env.ARCH_NAME }}) ==="
            docker run --platform ${{ env.PLATFORM }} --rm -v $(pwd):/out rockylinux:9 bash -c '
              set -e
              dnf install -y dnf-plugins-core
              mkdir -p /out/release/packages/rpm

              dnf download --downloadonly --downloaddir=/out/release/packages/rpm \
                --resolve --alldeps --arch=${{ env.PKG_ARCH }} -y \
                conntrack-tools socat ipset iptables sshpass nfs-utils \
                iscsi-initiator-utils iproute || true

              echo "Downloaded $(ls /out/release/packages/rpm/*.rpm 2>/dev/null | wc -l) RPM packages"
            '
          fi

      # ====================== 5. 最终打包（严格按你要求的 4 个文件名） ======================
      - name: Package offline bundle
        run: |
          mkdir -p release/scripts
          cp install.sh release/scripts/ 2>/dev/null || true
          echo "${K8S_VERSION}" > release/version.txt
          echo "${SEALOS_VERSION}" > release/bin/sealos-version.txt

          # 生成你指定的文件名
          TAR_NAME="k8s-offline-${{ env.ARCH_NAME }}-${{ matrix.os_type }}.tar.gz"
          tar -czf ${TAR_NAME} -C release .
          ls -lh k8s-offline-*.tar.gz

      # ====================== 6. 发布 ======================
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: k8s-offline-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}