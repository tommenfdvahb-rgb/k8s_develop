name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  shell-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: bash -n install.sh

      - name: Shellcheck
        run: shellcheck install.sh
